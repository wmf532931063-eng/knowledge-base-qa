<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 知识库问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }
        
        .status-panel {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .status-item {
            font-size: 1rem;
        }
        
        .count {
            font-weight: bold;
            margin-left: 5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
        }
        
        .qa-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .question-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            max-height: 150px;
        }
        
        .question-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-start;
            min-width: 100px;
        }
        
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .send-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .answer-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .answer-title {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .answer-content {
            color: #444;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .history-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .history-title {
            color: #333;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>AI 知识库问答系统</h1>
            <p>基于本地知识库的智能问答系统</p>
        </div>
        
        <!-- 状态栏 -->
        <div class="status-panel">
            <div class="status-info">
                <div class="status-item">
                    <span>文档片段:</span>
                    <span class="count" id="docCount">96</span>
                </div>
                <div class="status-item">
                    <span>知识文件:</span>
                    <span class="count" id="fileCount">3</span>
                </div>
            </div>
        </div>
        
        <!-- 主卡片 -->
        <div class="main-card">
            <!-- 问答区域 -->
            <div class="qa-section">
                <div class="input-group">
                    <textarea 
                        class="question-input" 
                        id="questionInput" 
                        placeholder="请输入您的问题... (按Ctrl+Enter发送)"
                        rows="3"
                    ></textarea>
                    <button class="send-button" id="sendButton" onclick="askQuestion()">
                        发送
                    </button>
                </div>
                
                <!-- 回答区域 -->
                <div class="answer-section" id="answerSection" style="display: none;">
                    <h3 class="answer-title">AI回答</h3>
                    <div class="answer-content" id="answerContent"></div>
                </div>
                
                <!-- 加载状态 -->
                <div class="loading" id="loadingSection" style="display: none;">
                    <div class="spinner"></div>
                    <span>AI正在思考中...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://knowledge-base-qa.onrender.com';
        
        // 处理键盘快捷键
        document.getElementById('questionInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                askQuestion();
            }
        });
        
        // 提问函数
        async function askQuestion() {
            const questionInput = document.getElementById('questionInput');
            const sendButton = document.getElementById('sendButton');
            const loadingSection = document.getElementById('loadingSection');
            const answerSection = document.getElementById('answerSection');
            const answerContent = document.getElementById('answerContent');
            
            const question = questionInput.value.trim();
            if (!question) return;
            
            // 禁用输入和按钮
            questionInput.disabled = true;
            sendButton.disabled = true;
            
            // 显示加载状态
            loadingSection.style.display = 'flex';
            answerSection.style.display = 'none';
            
            try {
                // 调用API
                const response = await fetch(`${API_BASE}/api/qa/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        topK: 5
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API错误: ${response.status}`);
                }
                
                const data = await response.json();
                
                // 显示回答
                answerContent.textContent = data.answer || '抱歉，未能生成回答。';
                answerSection.style.display = 'block';
                
                // 清空输入框
                questionInput.value = '';
                
                // 添加到历史记录
                addToHistory(question, data.answer);
                
            } catch (error) {
                console.error('提问失败:', error);
                answerContent.textContent = '抱歉，处理您的问题时发生错误。请稍后重试。';
                answerSection.style.display = 'block';
            } finally {
                // 恢复输入和按钮
                questionInput.disabled = false;
                sendButton.disabled = false;
                loadingSection.style.display = 'none';
            }
        }
        
        // 添加到历史记录
        function addToHistory(question, answer) {
            const historySection = document.querySelector('.history-section') || createHistorySection();
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <div class="history-question">问: ${question}</div>
                <div class="history-answer">答: ${answer.substring(0, 100)}...</div>
            `;
            
            historySection.insertBefore(historyItem, historySection.firstChild);
            
            // 限制历史记录数量
            const maxItems = 10;
            const items = historySection.querySelectorAll('.history-item');
            if (items.length > maxItems) {
                items[items.length - 1].remove();
            }
        }
        
        // 创建历史记录区域
        function createHistorySection() {
            const container = document.querySelector('.app-container');
            const historySection = document.createElement('div');
            historySection.className = 'history-section';
            historySection.innerHTML = '<h3 class="history-title">历史记录</h3>';
            container.appendChild(historySection);
            return historySection;
        }
    </script>
</body>
</html>
