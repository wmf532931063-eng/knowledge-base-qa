<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 知识库问答系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      
      .header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
      }
      
      .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      }
      
      .header p {
        font-size: 1.1rem;
        opacity: 0.9;
      }
      
      .card {
        background: #ffffff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        margin-bottom: 30px;
      }
      
      .status-bar {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 15px 20px;
        margin-bottom: 30px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .status-info {
        display: flex;
        gap: 25px;
      }
      
      .status-item {
        color: white;
        font-size: 1rem;
      }
      
      .count {
        font-weight: bold;
        margin-left: 5px;
        background: rgba(255, 255, 255, 0.2);
        padding: 3px 8px;
        border-radius: 4px;
      }
      
      .rebuild-button {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      .rebuild-button:hover {
        background: rgba(255, 255, 255, 0.35);
      }
      
      .rebuild-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      
      .qa-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      
      .input-section {
        display: flex;
        gap: 10px;
      }
      
      .input-wrapper {
        flex: 1;
      }
      
      .input-wrapper textarea {
        width: 100%;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        resize: vertical;
        min-height: 60px;
        max-height: 150px;
        background: white;
        transition: border-color 0.3s;
      }
      
      .input-wrapper textarea:focus {
        outline: none;
        border-color: #667eea;
      }
      
      .send-button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        align-self: flex-start;
      }
      
      .send-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      
      .send-button:disabled {
        background: #cccccc;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      
      .answer-section {
        margin-top: 20px;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 8px;
        border-left: 4px solid #667eea;
      }
      
      .answer-section h3 {
        color: #333;
        margin-bottom: 10px;
        font-size: 1.2rem;
      }
      
      .answer-content {
        color: #444;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      
      .sources-section {
        margin-top: 20px;
        padding: 15px;
        background: #f0f4ff;
        border-radius: 8px;
      }
      
      .sources-section h4 {
        color: #444;
        margin-bottom: 10px;
        font-size: 1rem;
      }
      
      .source-item {
        padding: 8px 12px;
        background: white;
        border-radius: 6px;
        margin-bottom: 8px;
        border-left: 3px solid #667eea;
        font-size: 0.9rem;
        color: #555;
      }
      
      .history-section {
        margin-top: 30px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      }
      
      .history-section h3 {
        color: #333;
        margin-bottom: 15px;
      }
      
      .history-item {
        padding: 15px;
        background: white;
        border-radius: 8px;
        margin-bottom: 10px;
        border: 1px solid #e0e0e0;
      }
      
      .history-question {
        font-weight: 600;
        color: #444;
        margin-bottom: 5px;
      }
      
      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(102, 126, 234, 0.3);
        border-radius: 50%;
        border-top-color: #667eea;
        animation: spin 1s ease-in-out infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
